name: "Monthly Dependency Update"

on:
  schedule:
    - cron: '0 0 1 * *' # Runs at 00:00 on day-of-month 1
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Update dependencies
        run: |
          pip install pip-upgrader
          pip-upgrade requirements.txt --skip-package-installation
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies"
          title: "Monthly Dependency Update"
          body: "This PR updates the python dependencies to their latest versions."
          branch: "update-dependencies"
